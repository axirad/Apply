<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Rounded yellow face -->
  <rect x="1" y="0" width="14" height="16" fill="#FFCC00"/>
  <rect x="0" y="1" width="16" height="14" fill="#FFCC00"/>
  <!-- Left eye white -->
  <rect x="3" y="4" width="3" height="3" fill="white"/>
  <!-- Left pupil — shifted down-right (looking toward text) -->
  <rect x="4" y="5" width="2" height="2" fill="#1a1a1a"/>
  <!-- Right eye white -->
  <rect x="10" y="4" width="3" height="3" fill="white"/>
  <!-- Right pupil — shifted down-right -->
  <rect x="11" y="5" width="2" height="2" fill="#1a1a1a"/>
  <!-- Smile -->
  <rect x="3" y="10" width="1" height="1" fill="#1a1a1a"/>
  <rect x="12" y="10" width="1" height="1" fill="#1a1a1a"/>
  <rect x="4" y="11" width="1" height="1" fill="#1a1a1a"/>
  <rect x="11" y="11" width="1" height="1" fill="#1a1a1a"/>
  <rect x="5" y="12" width="6" height="1" fill="#1a1a1a"/>
</svg>
